# FLEET CONFIG =================================================================

rmf_fleet:
  name: "tinyRobot"

  limits:
    linear: [0.5, 0.75]     # velocity, acceleration
    angular: [0.6, 2.0]     # velocity, acceleration

  profile:
    footprint: 0.3
    vicinity: 0.5

  reversible: True

  battery_system:
    voltage: 12.0
    capacity: 24.0
    charging_current: 5.0

  mechanical_system:
    mass: 20.0
    moment_of_inertia: 10.0
    friction_coefficient: 0.22

  ambient_system:
    power: 20.0

  tool_system:
    power: 0.0

  recharge_threshold: 0.10
  recharge_soc: 1.0

  publish_fleet_state: 10.0
  account_for_battery_drain: True

  task_capabilities:
    loop: True
    delivery: True
    clean: False

  finishing_request: "park"

  robots:
    tinyrobot1:
      charger: "charger_3"

    tinyrobot2:
      charger: "charger_2"

fleet_manager:
  ip: "127.0.0.1"
  port: 7001
  user: "some_user"
  password: "some_password"

  reference_coordinates:
    rmf: [[0.0, 0.0],
          [1.0, 1.0],
          [2.0, 2.0],
          [3.0, 3.0]]
    robot: [[0.0, 0.0],
            [1.0, 1.0],
            [2.0, 2.0],
            [3.0, 3.0]]
